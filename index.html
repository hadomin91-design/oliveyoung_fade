<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>올리브영 비주얼 영역</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #f6f6f6;
        }

        .visual {
            width: 100%;
            height: 646px;
            background-image: url('./fadeimg/visual_bg.jpg');
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            position: relative;
            overflow: hidden; 
        }

        .visual .inner {
            width: 1100px;
            height: 100%;
            margin: 0 auto;
            position: relative;
        }
        
       
        .visual .visual-title {
            position: absolute;
            top: 50%;
            left: 50%;
            
            transform: translate(-50%, -50%) scale(4.5); 
            opacity: 0.25; 
            z-index: 1; 
            width: 100%;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .visual .visual-title img {
            max-width: 350px; 
            width: 100%;
            height: auto;
        }

     
        .visual .product-set {
            position: absolute;
            bottom: 50px; 
            z-index: 10; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            text-align: center;
        }

        
        .visual .product-set .brand-logo {
            max-width: 120px; 
            height: auto;
            margin-bottom: 15px; 
        }

        
        .visual .product-set .brand-img {
            max-width: 100%;
            max-height: 450px; 
            height: auto;
            object-fit: contain;
        }

      
        
        /* [왼쪽] 클리오 킬래쉬 */
        .visual .pspoon {
            left: 50px;
            width: 200px;
        }

        /* [가운데] 3CE 하트팟 */
        .visual .pcup1 {
            left: 50%;
            transform: translateX(-50%); 
            width: 200px;
        }

        /* [오른쪽] 9wishes 수분앰플 */
        .visual .pcup2 {
            right: 50px;
            width: 240px;
        }

        
        .visual .fade-in {
            opacity: 0;
        }
    </style>
</head>
<body>

    <section class="visual">
        <div class="inner">
            
            <div class="visual-title">
                <img src="./fadeimg/Olive_Young_title.png" alt="올리브영">
            </div>
            
            <div class="product-set pspoon fade-in">
                <img src="./fadeimg/clio_logo.png" alt="클리오 로고" class="brand-logo">
                <img src="./fadeimg/clio_killlash.png" alt="클리오 킬래쉬" class="brand-img">
            </div>
            
            <div class="product-set pcup1 fade-in">
                <img src="./fadeimg/3ce_logo.png" alt="3ce 로고" class="brand-logo">
                <img src="./fadeimg/3ce_cosmetic.png" alt="3ce 화장품" class="brand-img">
            </div>
            
            <div class="product-set pcup2 fade-in">
                <img src="./fadeimg/9wishes_logo.png" alt="9wishes 로고" class="brand-logo">
                <img src="./fadeimg/9wishes_cosmetic.png" alt="9wishes 화장품" class="brand-img">
            </div>

        </div>
    </section>

    <script>
       
        const fadeEls = document.querySelectorAll('.visual .fade-in');
        
        fadeEls.forEach(function (fadeEl, index) {
            gsap.to(fadeEl, 1.2, {
                delay: index * 0.5, // 순차적으로 등장하는 시간 간격
                opacity: 1,
                y: -20, 
                ease: "power2.out"
            });
        });
    </script>
    
</body>
</html>
