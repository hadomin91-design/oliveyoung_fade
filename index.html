<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>올리브영 비주얼 영역</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #f6f6f6;
        }

        .visual {
            width: 100%;
            height: 646px;
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            position: relative;
            overflow: hidden; 
        }

        .visual .inner {
            width: 1100px;
            height: 100%;
            margin: 0 auto;
            position: relative;
        }
        
        /* 중앙 올리브영 타이틀 배경 */
        .visual .visual-title {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(2.5); /* 너무 크면 scale 조절 가능 */
            opacity: 0.15; 
            z-index: 1; 
            width: 100%;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .visual .visual-title img {
            max-width: 450px; 
            width: 100%;
            height: auto;
        }

        /* 화장품 세트 공통 스타일 */
        .visual .product-set {
            position: absolute;
            bottom: 60px; 
            z-index: 10; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            text-align: center;
        }

        .visual .product-set .brand-logo {
            max-width: 100px; 
            height: auto;
            margin-bottom: 20px; 
        }

        .visual .product-set .brand-img {
            max-width: 100%;
            max-height: 420px; 
            height: auto;
            object-fit: contain;
        }

        /* [왼쪽] 클리오 킬래쉬 */
        .visual .pspoon {
            left: 60px;
            width: 200px;
        }

        /* [가운데] 3CE 하트팟 */
        .visual .pcup1 {
            left: 50%;
            transform: translateX(-50%); 
            width: 200px;
        }

        /* [오른쪽] 9wishes 수분앰플 */
        .visual .pcup2 {
            right: 60px;
            width: 240px;
        }

        /* 애니메이션 전 초기 숨김 상태 */
        .visual .fade-in {
            opacity: 0;
        }
    </style>
</head>
<body>

    <section class="visual" id="visual-bg">
        <div class="inner">
            
            <div class="visual-title">
                <img id="title-img" src="" alt="올리브영">
            </div>
            
            <div class="product-set pspoon fade-in">
                <img src="" alt="클리오 로고" class="brand-logo">
                <img src="" alt="클리오 킬래쉬" class="brand-img">
            </div>
            
            <div class="product-set pcup1 fade-in">
                <img src="" alt="3ce 로고" class="brand-logo">
                <img src="" alt="3ce 화장품" class="brand-img">
            </div>
            
            <div class="product-set pcup2 fade-in">
                <img src="" alt="9wishes 로고" class="brand-logo">
                <img src="" alt="9wishes 화장품" class="brand-img">
            </div>

        </div>
    </section>

    <script>
        // 1. 본인의 깃허브 계정에 맞게 아래 주소를 변경해 주세요!
        // ⚠️ 주의: 맨 뒤에 슬래시(/)가 붙어있어야 합니다.
        const IMG_BASE_URL = "https://raw.githubusercontent.com/hadomin91-design/oliveyoung_fade/main/fadeimg/";

        // 2. 이미지 주소 바인딩 (배경 및 타이틀)
        document.getElementById('visual-bg').style.backgroundImage = `url('${IMG_BASE_URL}visual_bg.jpg')`;
        document.getElementById('title-img').src = IMG_BASE_URL + "Olive_Young_title.png";
        
        // 3. 각 상품별 로고 및 이미지 파일명 매핑
        const productSets = document.querySelectorAll('.product-set');
        const imgNames = [
            { logo: "clio_logo.png", prod: "clio_killlash.png" },      // 첫 번째 세트 (클리오)
            { logo: "3ce_logo.png", prod: "3ce_cosmetic.png" },        // 두 번째 세트 (3CE)
            { logo: "9wishes_logo.png", prod: "9wishes_cosmetic.png" } // 세 번째 세트 (9wishes)
        ];

        productSets.forEach((set, index) => {
            set.querySelector('.brand-logo').src = IMG_BASE_URL + imgNames[index].logo;
            set.querySelector('.brand-img').src = IMG_BASE_URL + imgNames[index].prod;
        });

        // 4. GSAP 순차적 Fade-in 애니메이션 실행
        window.addEventListener('load', () => {
            const fadeEls = document.querySelectorAll('.visual .fade-in');
            fadeEls.forEach(function (fadeEl, index) {
                gsap.to(fadeEl, {
                    opacity: 1,
                    y: 0,                      // 원래 위치로 오면서
                    duration: 1.2,             // 1.2초 동안 부드럽게
                    delay: (index + 1) * 0.4,  // 0.4초 간격으로 차례대로 등장
                    ease: "power2.out"
                });
            });
        });
    </script>
    
</body>
</html>
